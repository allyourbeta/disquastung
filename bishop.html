<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bishop Training - ChessMind Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/premium-chess-styles.css">
    <!-- Google tag (gtag.js) -->

<body class="game-page game-bishop">
    <div class="game-container">
        <div class="game-content">
            <h1 class="game-title">Bishop Training</h1>

            <div class="squares-container">
                <div class="square-display"></div>
                <div class="square-display"></div>
            </div>

            <div class="question-section">
                <p class="question-text">How many moves does the bishop need?</p>

                <form method="post" id="moveForm">
                    <div class="options-grid">
                        <button type="submit" name="user_moves" value="-1" class="option-button">N/A</button>
                        <button type="submit" name="user_moves" value="1" class="option-button">1</button>
                        <button type="submit" name="user_moves" value="2" class="option-button">2</button>
                    </div>
                </form>
            </div>

            <div class="navigation-section">
                <a href="/" class="nav-link">← Back to Training</a>
            </div>
        </div>
    </div>
    <script type="module" src="/src/ui/chessboard.js"></script>
    <script type="module" src="/src/ui/game.js"></script>
</body>
</html>
